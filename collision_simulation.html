<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Colisiones 1D</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 15px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }
        
        .canvas-container {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 15px;
            border: 2px solid #e9ecef;
        }
        
        canvas {
            display: block;
            width: 100%;
            background: white;
            border-radius: 8px;
        }
        
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .control-group {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }
        
        .control-group h3 {
            font-size: 14px;
            color: #495057;
            margin-bottom: 12px;
            font-weight: 600;
        }
        
        .control-item {
            margin-bottom: 12px;
        }
        
        .control-item:last-child {
            margin-bottom: 0;
        }
        
        label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #495057;
            margin-bottom: 5px;
        }
        
        .value-display {
            font-weight: 600;
            color: #667eea;
        }
        
        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #dee2e6;
            outline: none;
            -webkit-appearance: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        
        input[type="range"]::-webkit-slider-thumb:hover {
            background: #5568d3;
            transform: scale(1.1);
        }
        
        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            border: none;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        button {
            flex: 1;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #e9ecef;
            color: #495057;
        }
        
        .btn-secondary:hover {
            background: #dee2e6;
        }
        
        .info-panel {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        
        .info-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        
        .info-card h4 {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 5px;
            font-weight: 500;
        }
        
        .info-card .value {
            font-size: 20px;
            font-weight: 700;
        }
        
        .collision-type {
            text-align: center;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 2px solid #e9ecef;
        }
        
        .collision-type strong {
            color: #667eea;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Simulador de Colisiones 1D</h1>
        <p class="subtitle">Explora colisiones elásticas, inelásticas y explosivas</p>
        
        <div class="canvas-container">
            <canvas id="canvas" width="900" height="200"></canvas>
        </div>
        
        <div class="collision-type">
            <strong id="collisionType">Colisión Elástica (e = 1.0)</strong>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <h3>Masa 1 (Azul)</h3>
                <div class="control-item">
                    <label>
                        <span>Masa:</span>
                        <span class="value-display"><span id="m1Value">5.0</span> kg</span>
                    </label>
                    <input type="range" id="m1" min="0.5" max="20" step="0.5" value="5">
                </div>
                <div class="control-item">
                    <label>
                        <span>Velocidad Inicial:</span>
                        <span class="value-display"><span id="v1Value">3.0</span> m/s</span>
                    </label>
                    <input type="range" id="v1" min="-15" max="15" step="0.5" value="3">
                </div>
            </div>
            
            <div class="control-group">
                <h3>Masa 2 (Roja)</h3>
                <div class="control-item">
                    <label>
                        <span>Masa:</span>
                        <span class="value-display"><span id="m2Value">5.0</span> kg</span>
                    </label>
                    <input type="range" id="m2" min="0.5" max="20" step="0.5" value="5">
                </div>
                <div class="control-item">
                    <label>
                        <span>Velocidad Inicial:</span>
                        <span class="value-display"><span id="v2Value">-2.0</span> m/s</span>
                    </label>
                    <input type="range" id="v2" min="-15" max="15" step="0.5" value="-2">
                </div>
            </div>
        </div>
        
        <div class="control-group" style="grid-column: 1/-1;">
            <h3>Coeficiente de Restitución (e)</h3>
            <div class="control-item">
                <label>
                    <span>e = 0 (perfectamente inelástica) → e = 1 (elástica) → e > 1 (explosiva)</span>
                    <span class="value-display" id="eValue">1.0</span>
                </label>
                <input type="range" id="e" min="0" max="2" step="0.05" value="1">
            </div>
        </div>
        
        <div class="button-group">
            <button class="btn-primary" onclick="startSimulation()">Iniciar Simulación</button>
            <button class="btn-secondary" onclick="resetSimulation()">Reiniciar</button>
        </div>
        
        <div class="info-panel">
            <div class="info-card">
                <h4>Momento Inicial</h4>
                <div class="value" id="initialMomentum">0.00</div>
            </div>
            <div class="info-card">
                <h4>Momento Final</h4>
                <div class="value" id="finalMomentum">0.00</div>
            </div>
            <div class="info-card">
                <h4>Cambio de Energía Cinética</h4>
                <div class="value" id="energyChange">0.0%</div>
            </div>
        </div>
    </div>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let animationId;
        let isRunning = false;
        let hasCollided = false;
        let inCollision = false; // Track if currently overlapping
        
        // Simulation parameters
        let params = {
            m1: 5,
            m2: 5,
            v1_initial: 3,
            v2_initial: -2,
            e: 1,
            x1: 200,
            x2: 700,
            v1: 3,
            v2: -2
        };
        
        // Update displays
        function updateDisplays() {
            document.getElementById('m1Value').textContent = params.m1.toFixed(1);
            document.getElementById('m2Value').textContent = params.m2.toFixed(1);
            document.getElementById('v1Value').textContent = params.v1_initial.toFixed(1);
            document.getElementById('v2Value').textContent = params.v2_initial.toFixed(1);
            document.getElementById('eValue').textContent = params.e.toFixed(2);
            
            // Update collision type
            let collisionType = '';
            if (params.e === 0) {
                collisionType = 'Colisión Perfectamente Inelástica (e = 0)';
            } else if (params.e < 1) {
                collisionType = `Colisión Inelástica (e = ${params.e.toFixed(2)})`;
            } else if (params.e === 1) {
                collisionType = 'Colisión Elástica (e = 1.0)';
            } else {
                collisionType = `Colisión Explosiva (e = ${params.e.toFixed(2)})`;
            }
            document.getElementById('collisionType').textContent = collisionType;
            
            // Calculate initial values
            const p_initial = params.m1 * params.v1_initial + params.m2 * params.v2_initial;
            const ke_initial = 0.5 * params.m1 * params.v1_initial ** 2 + 0.5 * params.m2 * params.v2_initial ** 2;
            
            document.getElementById('initialMomentum').textContent = p_initial.toFixed(2);
            document.getElementById('finalMomentum').textContent = hasCollided ? 
                (params.m1 * params.v1 + params.m2 * params.v2).toFixed(2) : '--';
            
            if (hasCollided) {
                const ke_final = 0.5 * params.m1 * params.v1 ** 2 + 0.5 * params.m2 * params.v2 ** 2;
                const change = ((ke_final - ke_initial) / ke_initial * 100);
                document.getElementById('energyChange').textContent = (change > 0 ? '+' : '') + change.toFixed(1) + '%';
            } else {
                document.getElementById('energyChange').textContent = '--';
            }
        }
        
        // Event listeners
        document.getElementById('m1').addEventListener('input', (e) => {
            params.m1 = parseFloat(e.target.value);
            updateDisplays();
        });
        
        document.getElementById('m2').addEventListener('input', (e) => {
            params.m2 = parseFloat(e.target.value);
            updateDisplays();
        });
        
        document.getElementById('v1').addEventListener('input', (e) => {
            params.v1_initial = parseFloat(e.target.value);
            updateDisplays();
        });
        
        document.getElementById('v2').addEventListener('input', (e) => {
            params.v2_initial = parseFloat(e.target.value);
            updateDisplays();
        });
        
        document.getElementById('e').addEventListener('input', (e) => {
            params.e = parseFloat(e.target.value);
            updateDisplays();
        });
        
        function drawMass(x, y, radius, color, velocity, mass, label) {
            // Draw shadow
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.beginPath();
            ctx.ellipse(x, y + radius + 15, radius * 0.8, radius * 0.3, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Draw mass
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'rgba(0,0,0,0.3)';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Draw velocity arrow
            if (Math.abs(velocity) > 0.1) {
                const arrowLength = Math.min(Math.abs(velocity) * 15, 80);
                const arrowX = x + (velocity > 0 ? radius + 10 : -radius - 10);
                const arrowEndX = arrowX + (velocity > 0 ? arrowLength : -arrowLength);
                
                ctx.strokeStyle = color;
                ctx.fillStyle = color;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(arrowX, y);
                ctx.lineTo(arrowEndX, y);
                ctx.stroke();
                
                // Arrowhead
                const headSize = 8;
                ctx.beginPath();
                if (velocity > 0) {
                    ctx.moveTo(arrowEndX, y);
                    ctx.lineTo(arrowEndX - headSize, y - headSize/2);
                    ctx.lineTo(arrowEndX - headSize, y + headSize/2);
                } else {
                    ctx.moveTo(arrowEndX, y);
                    ctx.lineTo(arrowEndX + headSize, y - headSize/2);
                    ctx.lineTo(arrowEndX + headSize, y + headSize/2);
                }
                ctx.closePath();
                ctx.fill();
            }
            
            // Draw label
            ctx.fillStyle = '#333';
            ctx.font = 'bold 14px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(label, x, y - radius - 10);
            
            // Draw mass and velocity info
            ctx.font = '11px sans-serif';
            ctx.fillText(`${mass.toFixed(1)} kg`, x, y + 5);
            ctx.fillText(`${velocity.toFixed(2)} m/s`, x, y + 18);
        }
        
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw ground line
            ctx.strokeStyle = '#dee2e6';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, 150);
            ctx.lineTo(canvas.width, 150);
            ctx.stroke();
            
            // Calculate radii based on mass (proportional to mass^(1/3) for 2D representation of 3D volume)
            const radius1 = Math.max(20, Math.min(50, 7.60 + Math.pow(params.m1, 1/3) * 15.6));
            const radius2 = Math.max(20, Math.min(50, 7.60 + Math.pow(params.m2, 1/3) * 15.6));
            
            // Draw masses
            drawMass(params.x1, 140, radius1, '#667eea', params.v1, params.m1, 'Masa 1');
            drawMass(params.x2, 140, radius2, '#e74c3c', params.v2, params.m2, 'Masa 2');
            
            // Draw collision point indicator if currently colliding
            if (inCollision) {
                ctx.fillStyle = 'rgba(255, 215, 0, 0.3)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#f39c12';
                ctx.font = 'bold 24px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('¡COLISIÓN!', canvas.width / 2, 30);
            }
        }
        
        function calculateCollision() {
            const m1 = params.m1;
            const m2 = params.m2;
            const u1 = params.v1;
            const u2 = params.v2;
            const e = params.e;
            
            // Conservation of momentum: m1*u1 + m2*u2 = m1*v1 + m2*v2
            // Coefficient of restitution: e = (v2 - v1) / (u1 - u2)
            
            // Solving the system of equations:
            const v1_final = ((m1 - e*m2)*u1 + m2*(1 + e)*u2) / (m1 + m2);
            const v2_final = ((m2 - e*m1)*u2 + m1*(1 + e)*u1) / (m1 + m2);
            
            params.v1 = v1_final;
            params.v2 = v2_final;
            hasCollided = true;
        }
        
        function update() {
            if (!isRunning) return;
            
            const dt = 0.5;
            params.x1 += params.v1 * dt;
            params.x2 += params.v2 * dt;
            
            // Check for collision - only collide if masses are approaching each other
            const radius1 = Math.max(20, Math.min(50, 7.60 + Math.pow(params.m1, 1/3) * 15.6));
            const radius2 = Math.max(20, Math.min(50, 7.60 + Math.pow(params.m2, 1/3) * 15.6));
            
            const overlapping = Math.abs(params.x2 - params.x1) <= (radius1 + radius2);
            
            // Relative velocity: if v1 > v2, mass1 is approaching mass2
            const approaching = (params.v1 - params.v2) > 0;
            
            if (overlapping && approaching && !inCollision) {
                calculateCollision();
                hasCollided = true;
                inCollision = true;
                updateDisplays();
            } else if (!overlapping) {
                // Reset collision flag when masses separate
                inCollision = false;
            }
            
            // Bounce off walls
            if (params.x1 <= radius1 || params.x1 >= canvas.width - radius1) {
                params.v1 *= -0.8;
                params.x1 = Math.max(radius1, Math.min(canvas.width - radius1, params.x1));
            }
            if (params.x2 <= radius2 || params.x2 >= canvas.width - radius2) {
                params.v2 *= -0.8;
                params.x2 = Math.max(radius2, Math.min(canvas.width - radius2, params.x2));
            }
            
            draw();
            animationId = requestAnimationFrame(update);
        }
        
        function startSimulation() {
            if (isRunning) return;
            
            isRunning = true;
            hasCollided = false;
            inCollision = false;
            params.v1 = params.v1_initial;
            params.v2 = params.v2_initial;
            updateDisplays();
            update();
        }
        
        function resetSimulation() {
            isRunning = false;
            hasCollided = false;
            inCollision = false;
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            
            params.x1 = 200;
            params.x2 = 700;
            params.v1 = params.v1_initial;
            params.v2 = params.v2_initial;
            
            updateDisplays();
            draw();
        }
        
        // Initial setup
        updateDisplays();
        draw();
    </script>
</body>
</html>
